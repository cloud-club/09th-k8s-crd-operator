apiVersion: v1
kind: ServiceAccount
metadata:
  name: canary-demo-dashboard
  namespace: team-5
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: canary-demo-dashboard
  namespace: team-5
rules:
  - apiGroups: ["deploy.canary.com"]
    resources: ["canaryreleases"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: canary-demo-dashboard
  namespace: team-5
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: canary-demo-dashboard
subjects:
  - kind: ServiceAccount
    name: canary-demo-dashboard
    namespace: team-5
