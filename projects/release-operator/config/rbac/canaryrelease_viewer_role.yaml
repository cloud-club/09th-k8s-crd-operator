# This rule is not used by the project release-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to deploy.canary.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: release-operator
    app.kubernetes.io/managed-by: kustomize
  name: canaryrelease-viewer-role
rules:
- apiGroups:
  - deploy.canary.com
  resources:
  - canaryreleases
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - deploy.canary.com
  resources:
  - canaryreleases/status
  verbs:
  - get
