apiVersion: v1
kind: ConfigMap
metadata:
  name: config
  namespace: system
  labels:
    app.kubernetes.io/name: kafka-operator
    app.kubernetes.io/managed-by: kustomize
data:
  # Comma-separated Kafka bootstrap servers the operator connects to.
  # When the operator runs inside the cluster but Kafka runs on the host
  # (kind / Docker Desktop), use host.docker.internal so the pod can reach it.
  # Set to an empty string to fall back to the in-memory fake client.
  bootstrap: "host.docker.internal:9092"
