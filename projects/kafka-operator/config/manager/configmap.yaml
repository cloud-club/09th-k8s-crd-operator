apiVersion: v1
kind: ConfigMap
metadata:
  name: config
  namespace: system
  labels:
    app.kubernetes.io/name: kafka-operator
    app.kubernetes.io/managed-by: kustomize
data:
  # Comma-separated Kafka bootstrap servers the operator connects to.
  # In-cluster Kafka deployed by hack/gabia/kafka.yaml (Service "kafka" in team-2).
  # For a host-run kind/Docker Desktop broker instead, use host.docker.internal:9092.
  # Set to an empty string to fall back to the in-memory fake client.
  bootstrap: "kafka.team-2.svc.cluster.local:9092"
