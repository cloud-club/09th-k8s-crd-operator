# 담당자 1 로컬 개발용 Kafka (KRaft 단일 브로커, ZooKeeper 없음).
# 클라이언트 통합 테스트 / 접속 테스트 대상.
#
#   docker compose -f hack/local/docker-compose.yaml up -d
#   docker compose -f hack/local/docker-compose.yaml down -v   # 볼륨까지 정리
#
# host 에서 bootstrap = localhost:9092 로 접속한다.
services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka-local
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      # 빈 호스트(:9092)는 모든 인터페이스에 바인딩(host 포트 매핑 가능)하면서
      # apache/kafka format 단계의 0.0.0.0 메타주소 검증을 피한다. host 에는 localhost:9092 로 광고.
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # 단일 브로커이므로 내부 토픽 복제 계수는 모두 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # 우리 operator 만 토픽을 만든다 — 없는 토픽이 ErrTopicNotFound 로 정확히 떨어지도록 auto-create 비활성화
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 12
