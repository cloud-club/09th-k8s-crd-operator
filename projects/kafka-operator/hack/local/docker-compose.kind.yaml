# 패턴 B 실험용 Kafka: operator 는 kind 클러스터 안, Kafka 는 호스트.
# kind 파드는 host.docker.internal 로 호스트에 도달하므로, 브로커도 그 주소를 advertise해야
# 부트스트랩 이후 재연결이 깨지지 않는다 (advertised.listeners 함정 회피).
#
#   docker compose -f hack/local/docker-compose.kind.yaml up -d
#   docker compose -f hack/local/docker-compose.kind.yaml down -v
#
# kind 파드에서 bootstrap = host.docker.internal:9092 로 접속한다.
services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka-kind
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      # 호스트 개발용(localhost)과 달리, kind 파드가 도달하는 host.docker.internal 을 advertise
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://host.docker.internal:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 12
