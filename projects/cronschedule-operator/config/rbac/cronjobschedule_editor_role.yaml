# This rule is not used by the project cronschedule-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the cron.example.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cronschedule-operator
    app.kubernetes.io/managed-by: kustomize
  name: cronjobschedule-editor-role
rules:
- apiGroups:
  - cron.example.com
  resources:
  - cronjobschedules
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cron.example.com
  resources:
  - cronjobschedules/status
  verbs:
  - get
