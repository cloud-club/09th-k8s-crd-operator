                    type: boolean
                type: object
              metrics:
                description: Metrics는 Metrics 관측 설정이다.
                properties:
                  enabled:
                    description: Enabled는 Metrics 관측 활성화 여부이다.
                    type: boolean
                  path:
                    description: 'Path는 Metrics endpoint 경로이다. 예: /metrics'
                    type: string
                  port:
                    description: 'Port는 Metrics endpoint port 이름이다. 예: http'
